name: Validate spine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sanity check: catches drift if dependencies change upstream.
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -r lint/requirements.txt

      - name: JSON Schemas are valid
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          for p in sorted(Path("schemas").glob("*.schema.json")):
              s = json.loads(p.read_text())
              Draft202012Validator.check_schema(s)
              print(f"OK {p}")
          EOF

      - name: Tag vocabulary parses
        run: |
          python - <<'EOF'
          import re
          from pathlib import Path
          text = Path("tag-vocabulary.md").read_text()
          tags = re.findall(r"^- `([a-z0-9][a-z0-9/-]*)`", text, flags=re.MULTILINE)
          assert len(tags) > 20, f"suspiciously few tags: {len(tags)}"
          # No duplicates
          dupes = [t for t in set(tags) if tags.count(t) > 1]
          assert not dupes, f"duplicate tags: {dupes}"
          # type/* and access/* roots present
          assert any(t.startswith("type/") for t in tags), "no type/ tags"
          assert any(t.startswith("access/") for t in tags), "no access/ tags"
          print(f"OK tag-vocabulary.md — {len(tags)} unique tags")
          EOF

      - name: Lint script smoke test
        run: |
          # Exercise both lint scripts against a tiny synthetic vault to make
          # sure the binaries import cleanly and exit 0 on a clean tree.
          mkdir -p /tmp/synthetic-vault/wiki
          cat > /tmp/synthetic-vault/wiki/hello.md <<'EOF'
          ---
          type: wiki
          title: "Hello"
          slug: hello
          tags: [type/wiki, access/public]
          ---
          # Hello
          EOF
          python lint/lint_vault.py /tmp/synthetic-vault
          python lint/pii_scan.py /tmp/synthetic-vault
